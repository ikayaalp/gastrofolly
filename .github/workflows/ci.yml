name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Sadece Prisma Client tiplerini üretir, gerçek bir veritabanına
      # bağlanmaz (schema.prisma'dan yerel olarak üretilir) — bu yüzden
      # DATABASE_URL secret'ına ihtiyaç yok ve prod DB'ye dokunulmaz.
      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
